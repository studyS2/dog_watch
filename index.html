<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>[너희들은 변호됐다] 팬게임 ~나는 결벽증이 아니야~</title>
<link rel="stylesheet" href="css/style.css?v=14">
</head>
<body>

<div id="game">
<div id="coverScreen" aria-label="표지 화면. 아무 곳이나 클릭하면 시작합니다.">
  <img id="coverImage" src="image/cover.png" alt="게임 표지">
  <div id="coverStartText">note! 아무 곳이나 클릭하여 시작</div>
</div>

  <div id="hud">
    <div id="levelText">Level 1</div>
    <div id="timeText">15.0</div>
  </div>

  <div id="top">
    <div id="barWrap"><div id="bar"></div></div>
    <div id="board"></div>
  </div>

  <div id="dog"><img id="dogSprite" src="image/dog_right_stop.png" alt=""></div>

  <div id="dialog"></div>
  <div class="controls">
    <button id="nextBtn">다음</button>
  </div>
</div>

<div id="overlay" class="hidden"></div>

<script src="js/game.js?v=14"></script>
</body>
</html>
